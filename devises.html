<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur de devises</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
h2{text-align:center;color:#0b7dda;}
input,select,button{width:100%;padding:12px;margin:10px 0;font-size:18px;box-sizing:border-box;}
button{background:#0b7dda;color:white;border:none;border-radius:6px;}
#resultat{margin-top:15px;font-size:20px;font-weight:bold;}
a{display:block;margin-top:20px;text-align:center;text-decoration:none;color:#0b7dda;}
</style>

</head>
<body>

<div class="container">

<h2>💱 Convertisseur de devises</h2>

<input type="number" id="montant" placeholder="Montant en DH">

<select id="devise">
<option value="0.092">Euro (EUR)</option>
<option value="0.11">Dollar US (USD)</option>
<option value="0.08">Livre Sterling (GBP)</option>
</select>

<button onclick="convertir()">Convertir</button>

<div id="resultat"></div>

<a href="index.html">⬅ Retour à l'accueil</a>

</div>

<script>
function convertir(){
let montant=parseFloat(document.getElementById("montant").value);
let taux=parseFloat(document.getElementById("devise").value);

if(isNaN(montant)){
document.getElementById("resultat").innerHTML="Veuillez saisir un montant.";
return;
}

let resultat=montant*taux;

document.getElementById("resultat").innerHTML=
"Montant converti : <br><strong>"+resultat.toFixed(2)+"</strong>";
}
</script>

</body>
</html>
