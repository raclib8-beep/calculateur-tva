<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul IR Maroc</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0b7dda;
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
box-sizing:border-box;
}

button{
background:#0b7dda;
color:white;
border:none;
border-radius:6px;
}

#resultat{
margin-top:15px;
font-size:18px;
font-weight:bold;
line-height:1.6;
}

a{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#0b7dda;
}
</style>

</head>

<body>

<div class="container">

<h2>📈 Calcul IR Maroc</h2>

<input type="number" id="revenu" placeholder="Salaire mensuel imposable (DH)">

<button onclick="calculer()">Calculer</button>

<div id="resultat"></div>

<a href="index.html">⬅ Retour à l'accueil</a>

</div>


<script>

function calculer(){

let revenu = parseFloat(document.getElementById("revenu").value);

if(isNaN(revenu) || revenu<0){
document.getElementById("resultat").innerHTML="Veuillez saisir un montant valide.";
return;
}

let taux=0;
let deduction=0;

if(revenu<=3333.33){
taux=0;
deduction=0;
}
else if(revenu<=5000){
taux=0.10;
deduction=333.33;
}
else if(revenu<=6666.67){
taux=0.20;
deduction=833.33;
}
else if(revenu<=8333.33){
taux=0.30;
deduction=1500;
}
else if(revenu<=15000){
taux=0.34;
deduction=1833.33;
}
else{
taux=0.37;
deduction=2283.33;
}

let ir=(revenu*taux)-deduction;

let ir=(revenu*taux)-deduction;

if(ir<0) ir=0;

document.getElementById("resultat").innerHTML=
"<b>Salaire imposable :</b> "+revenu.toFixed(2)+" DH<br>"+
"<b>IR :</b> "+ir.toFixed(2)+" DH<br>"+
"<b>Salaire après IR :</b> "+(revenu-ir).toFixed(2)+" DH";

}
</script>

</body>
</html>
