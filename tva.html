<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur TVA Maroc</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}
h2{
text-align:center;
color:#0b7dda;
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
box-sizing:border-box;
}
button{
background:#0b7dda;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}
#resultat{
margin-top:15px;
font-size:20px;
font-weight:bold;
}
.retour{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#0b7dda;
}
</style>
</head>
<body>

<div class="container">
<h2>Calculateur TVA Maroc (20%)</h2>

<input type="number" id="ht" placeholder="Montant HT en DH">

<button onclick="calculer()">Calculer</button>

<div id="resultat"></div>

<a class="retour" href="index.html">⬅ Retour à l'accueil</a>
</div>

<script>
function calculer() {
  let ht = parseFloat(document.getElementById("ht").value);

  if (isNaN(ht)) {
    document.getElementById("resultat").innerHTML = "Veuillez saisir un montant.";
    return;
  }

  let tva = ht * 0.20;
  let ttc = ht + tva;

  document.getElementById("resultat").innerHTML =
    "TVA : " + tva.toFixed(2) + " DH<br>" +
    "TTC : " + ttc.toFixed(2) + " DH";
}
</script>

</body>
</html>
