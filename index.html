<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur TVA Maroc</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
text-align:center;
}
.container{
background:#fff;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
input,button{
width:100%;
padding:10px;
margin:10px 0;
font-size:18px;
}
button{
background:#0b7dda;
color:white;
border:none;
border-radius:5px;
}
#resultat{
font-size:20px;
font-weight:bold;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
<h2>Calculateur TVA Maroc (20%)</h2>

<input type="number" id="ht" placeholder="Montant HT">

<button onclick="calculer()">Calculer TTC</button>

<div id="resultat"></div>
</div>

<script>
function calculer(){
let ht=parseFloat(document.getElementById("ht").value);
if(isNaN(ht)){
document.getElementById("resultat").innerHTML="Saisissez un montant.";
return;
}
let tva=ht*0.20;
let ttc=ht+tva;
document.getElementById("resultat").innerHTML=
"TVA : "+tva.toFixed(2)+" DH<br>TTC : "+ttc.toFixed(2)+" DH";
}
</script>

</body>
</html>
